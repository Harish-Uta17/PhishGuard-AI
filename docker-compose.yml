version: "3.9"

services:
  api:
    build: .
    container_name: networksecurity-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build: .
    container_name: networksecurity-dashboard
    command: streamlit run streamlit_app/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_BASE_URL: http://api:8000/api/v1
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"
